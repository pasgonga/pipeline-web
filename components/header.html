<!--
  Pipeline Software · Header / Navegación principal
  ──────────────────────────────────────────────────
  Componente reutilizable. Se carga en todas las páginas
  mediante el div #header-root y components.js.

  Para actualizar la navegación, modifica solo este archivo.

  Cómo añadir un nuevo link de nav:
    <a href="nueva-pagina.html">Nuevo item</a>
-->

<!-- Acceso directo al contenido principal (WCAG 2.4.1) -->
<a class="skip-link" href="#main-content">Saltar al contenido principal</a>

<nav class="nav" aria-label="Navegación principal">

  <!-- Logotipo -->
  <a href="index.html" class="logo" aria-label="Pipeline Software — Ir al inicio">
    <span class="logo-text">Pipeline</span>
    <div class="logo-dot" aria-hidden="true"></div>
    <span class="logo-soft">software</span>
  </a>

  <!-- Links de navegación (ocultos en móvil; visibles con el hamburger) -->
  <div class="nav-links" id="nav-links" role="list">
    <a href="productos.html"     role="listitem">Productos</a>
    <a href="soluciones.html"    role="listitem">Soluciones</a>
    <a href="integraciones.html" role="listitem">Integraciones</a>
    <a href="empresa.html"       role="listitem">Empresa</a>
    <a href="blog.html"          role="listitem">Blog</a>
  </div>

  <!-- Botones de acción + hamburger móvil -->
  <div class="nav-right">
    <a href="acceder.html" class="btn-ghost">Acceder</a>
    <a href="demo.html"    class="btn-nav">Solicitar demo</a>

    <!--
      Botón hamburger (visible solo en móvil, ≤ 900px).
      aria-expanded y aria-label se gestionan desde components.js.
    -->
    <button
      class="nav-hamburger"
      id="nav-hamburger"
      aria-label="Abrir menú de navegación"
      aria-expanded="false"
      aria-controls="nav-links"
      type="button"
    >
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
  </div>

</nav>
